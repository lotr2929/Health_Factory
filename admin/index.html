<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mobius Factory — Admin</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #e2dccd;
      --surface:   #f5eedd;
      --surface2:  #ede5d4;
      --border:    #c9bfae;
      --accent:    #8d7c64;
      --accent-dk: #574d3e;
      --accent-lt: #b8a898;
      --text:      #1a1208;
      --text-dim:  #574d3e;
      --text-lt:   #6b5a42;
      --danger:    #a04040;
      --success:   #4a7a4a;
      --font:      'Century Gothic', 'Avenir', 'Segoe UI', 'Verdana', sans-serif;
      --radius:    1px;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      line-height: 1.5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── LOGIN GATE ── */
    #login-gate {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      gap: 20px;
    }
    #login-gate h1 {
      font-size: 1.8rem;
      font-weight: normal;
      color: var(--accent-dk);
      letter-spacing: 0.04em;
    }
    #login-gate p { color: var(--text-dim); font-size: 13px; }
    .btn-google {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      padding: 8px 18px;
      border-radius: var(--radius);
      cursor: pointer;
      text-decoration: none;
      transition: background 0.15s, border-color 0.15s;
    }
    .btn-google:hover { background: var(--surface2); border-color: var(--accent); }

    /* ── MAIN APP ── */
    #app { display: none; flex-direction: column; height: 100vh; overflow: hidden; }

    /* ── TOPBAR ── */
    #topbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
    }

    /* Row 1: logo + stats + user */
    #topbar-row1 {
      display: flex;
      align-items: center;
      padding: 0 16px;
      height: 40px;
      gap: 16px;
    }

    .logo {
      font-size: 13px;
      color: var(--accent-dk);
      letter-spacing: 0.08em;
      white-space: nowrap;
    }

    #stats {
      display: flex;
      gap: 16px;
      font-size: 12px;
      color: var(--text-dim);
    }
    #stats span b { color: var(--accent-dk); }

    .spacer { flex: 1; }

    #user-info {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--text-dim);
    }
    #user-info img { width: 20px; height: 20px; border-radius: 50%; border: 1px solid var(--border); }
    #signout-btn {
      background: none; border: none;
      color: var(--text-lt); font-family: var(--font); font-size: 11px;
      cursor: pointer; padding: 1px 5px; transition: color 0.15s;
    }
    #signout-btn:hover { color: var(--danger); }

    /* Row 2: module status bar */
    #module-bar {
      display: flex;
      align-items: center;
      padding: 4px 16px;
      gap: 10px;
      border-top: 1px solid var(--border);
      background: var(--surface2);
      min-height: 34px;
    }

    #module-status {
      font-size: 13px;
      font-weight: bold;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent-dk);
      min-width: 80px;
    }

    #mode-status {
      font-size: 11px;
      color: var(--text-lt);
      letter-spacing: 0.05em;
      text-transform: uppercase;
      border-left: 1px solid var(--border);
      padding-left: 10px;
    }

    #module-chips { display: flex; gap: 5px; flex-wrap: wrap; margin-left: 8px; }
    .module-chip {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-dim);
      font-family: var(--font);
      font-size: 11px;
      padding: 2px 8px;
      border-radius: var(--radius);
      cursor: pointer;
      transition: all 0.12s;
    }
    .module-chip:hover { border-color: var(--accent); color: var(--text); }
    .module-chip.active { background: var(--accent-dk); border-color: var(--accent-dk); color: #fff; }

    #module-new-input {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--font);
      font-size: 11px;
      padding: 3px 8px;
      border-radius: var(--radius);
      outline: none;
      width: 120px;
      transition: border-color 0.15s;
    }
    #module-new-input:focus { border-color: var(--accent); }

    .btn-xs {
      background: var(--accent);
      border: none;
      color: #fff;
      font-family: var(--font);
      font-size: 11px;
      padding: 3px 8px;
      border-radius: var(--radius);
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }
    .btn-xs:hover { background: var(--accent-dk); }
    .btn-xs.outline {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-dim);
    }
    .btn-xs.outline:hover { border-color: var(--accent); color: var(--text); background: transparent; }
    .btn-xs:disabled { opacity: 0.4; cursor: default; }

    /* ── MAIN LAYOUT ── */
    #main-layout {
      display: grid;
      grid-template-columns: 340px 1fr;
      flex: 1;
      overflow: hidden;
      min-height: 0;
    }

    /* ── LEFT PANEL — INPUT ── */
    #left-panel {
      display: flex;
      flex-direction: column;
      background: var(--surface);
      border-right: 1px solid var(--border);
      overflow: hidden;
    }

    #left-panel-header {
      padding: 10px 14px 8px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    #left-panel-header h3 {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--text-dim);
      font-weight: normal;
    }

    /* Brief list (scrollable, above input) */
    #brief-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
      min-height: 0;
    }

    .brief-item {
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 4px;
      cursor: pointer;
      background: var(--surface2);
      transition: background 0.12s, border-color 0.12s;
    }
    .brief-item:hover { background: var(--bg); }
    .brief-item.active { background: var(--bg); border-color: var(--accent); }
    .brief-item-text {
      font-size: 12px;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .brief-item-meta {
      font-size: 10px;
      color: var(--text-lt);
      margin-top: 2px;
      display: flex;
      gap: 6px;
      align-items: center;
    }
    .status-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      display: inline-block;
    }
    .status-dot.active { background: var(--success); }
    .status-dot.closed { background: var(--accent-lt); }

    /* Input area at bottom of left panel */
    #input-area {
      border-top: 1px solid var(--border);
      padding: 10px 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      background: var(--surface);
    }

    #main-input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--font);
      font-size: 13px;
      padding: 10px 12px;
      border-radius: var(--radius);
      resize: none;
      outline: none;
      min-height: 100px;
      max-height: 200px;
      line-height: 1.6;
      transition: border-color 0.15s;
    }
    #main-input:focus { border-color: var(--accent); }

    #input-actions {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .btn-send {
      background: var(--accent);
      border: none;
      color: #fff;
      font-family: var(--font);
      font-size: 13px;
      padding: 6px 18px;
      border-radius: var(--radius);
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-send:hover { background: var(--accent-dk); }
    .btn-send:disabled { background: var(--accent-lt); cursor: default; }

    #crawl-btn {
      background: transparent;
      border: 1px solid var(--accent);
      color: var(--accent);
      font-family: var(--font);
      font-size: 12px;
      padding: 5px 12px;
      border-radius: var(--radius);
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      white-space: nowrap;
    }
    #crawl-btn:hover { background: var(--accent); color: #fff; }
    #crawl-btn:disabled { opacity: 0.4; cursor: default; }

    #hint-text {
      font-size: 11px;
      color: var(--text-lt);
      font-style: italic;
    }

    /* ── RIGHT PANEL — GEMINI RESPONSES ── */
    #right-panel {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--bg);
    }

    #right-panel-header {
      padding: 10px 16px 8px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    #right-panel-header h3 {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--text-dim);
      font-weight: normal;
    }
    #right-panel-actions { display: flex; gap: 6px; }

    /* Messages */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      min-height: 0;
    }

    .msg { display: flex; gap: 10px; }
    .msg.user { flex-direction: row-reverse; }

    .msg-avatar {
      width: 24px; height: 24px;
      border-radius: var(--radius);
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: bold;
      flex-shrink: 0; margin-top: 2px;
    }
    .msg.assistant .msg-avatar { background: var(--accent); color: #fff; }
    .msg.user .msg-avatar { background: var(--surface2); color: var(--text-dim); border: 1px solid var(--border); }

    .msg-bubble {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 14px;
      font-size: 13px;
      line-height: 1.65;
      white-space: pre-wrap;
      color: var(--text);
      max-width: calc(100% - 36px);
    }
    .msg.user .msg-bubble { background: var(--surface2); border-color: var(--accent-lt); }
    .msg-bubble.thinking { color: var(--text-dim); font-style: italic; }

    /* Review mode — findings in right panel */
    #findings-panel {
      display: none;
      flex-direction: column;
      flex: 1;
      overflow: hidden;
    }
    #findings-panel.active { display: flex; }
    #messages-panel { display: flex; flex-direction: column; flex: 1; overflow: hidden; }
    #messages-panel.hidden { display: none; }

    /* Finding cards in right panel */
    #findings-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .finding-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 14px;
      cursor: pointer;
      transition: border-color 0.12s, background 0.12s;
    }
    .finding-card:hover { border-color: var(--accent-lt); background: var(--surface2); }
    .finding-card.active { border-color: var(--accent); background: var(--surface2); }
    .finding-card.redundant { opacity: 0.55; }

    .fc-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6px;
    }
    .fc-topic { font-size: 13px; color: var(--text); font-weight: normal; }
    .fc-meta { display: flex; gap: 6px; align-items: center; }

    .conf-badge {
      font-size: 10px;
      padding: 1px 5px;
      border-radius: var(--radius);
    }
    .conf-high { background: #d4e8d4; color: var(--success); border: 1px solid #b0d0b0; }
    .conf-mid  { background: #f5ead4; color: #7a5a20; border: 1px solid #d4c090; }
    .conf-low  { background: #f5d4d4; color: var(--danger); border: 1px solid #d4a0a0; }
    .redundant-flag {
      font-size: 10px; color: #7a5a20;
      background: #f5ead4; border: 1px solid #d4c090;
      padding: 1px 5px; border-radius: var(--radius);
    }

    .fc-plain { font-size: 12px; color: var(--text-dim); margin-bottom: 8px; line-height: 1.5; }
    .fc-url { font-size: 11px; color: var(--text-lt); text-decoration: none; }
    .fc-url:hover { color: var(--accent); }

    .fc-actions {
      display: flex;
      gap: 6px;
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid var(--border);
    }

    .btn-approve {
      background: var(--success); border: none; color: #fff;
      font-family: var(--font); font-size: 11px; padding: 4px 12px;
      border-radius: var(--radius); cursor: pointer; transition: background 0.15s;
    }
    .btn-approve:hover { background: #3a6a3a; }

    .btn-discard {
      background: transparent; border: 1px solid var(--danger); color: var(--danger);
      font-family: var(--font); font-size: 11px; padding: 4px 12px;
      border-radius: var(--radius); cursor: pointer; transition: all 0.15s;
    }
    .btn-discard:hover { background: var(--danger); color: #fff; }

    /* Source chips */
    .sources-section {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
    }
    .sources-section h4 {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-lt);
      margin-bottom: 6px;
      font-weight: normal;
    }
    .source-chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2px 7px;
      margin: 2px 2px 2px 0;
      font-size: 11px;
      color: var(--text);
    }
    .source-chip.approved { border-color: var(--success); background: #edf5ed; }
    .source-chip.rejected { opacity: 0.4; text-decoration: line-through; }
    .approve-src, .reject-src {
      background: none; border: none; cursor: pointer; font-size: 12px; padding: 0;
    }
    .approve-src { color: var(--success); }
    .reject-src  { color: var(--danger); }

    /* Tag list */
    .tag-list { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
    .tag {
      font-size: 10px;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text-dim);
      padding: 1px 6px;
      border-radius: var(--radius);
    }

    /* Empty state */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--text-lt);
      gap: 8px;
      padding: 20px;
    }
    .empty-state .empty-icon { font-size: 1.4rem; opacity: 0.35; }
    .empty-state p { font-size: 12px; text-align: center; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--accent-lt); }

    /* Toast */
    #toast {
      position: fixed;
      bottom: 16px; right: 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--font);
      font-size: 12px;
      padding: 7px 14px;
      border-radius: var(--radius);
      box-shadow: 2px 4px 10px rgba(0,0,0,0.1);
      opacity: 0; transform: translateY(6px);
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none; z-index: 100;
    }
    #toast.show { opacity: 1; transform: translateY(0); }
    #toast.success { border-color: var(--success); color: var(--success); }
    #toast.error   { border-color: var(--danger);  color: var(--danger); }

    /* Thinking dots */
    @keyframes blink { 0%,80%,100%{opacity:0.2} 40%{opacity:1} }
    .dot { display:inline-block; width:5px; height:5px; border-radius:50%; background:var(--accent-lt); animation:blink 1.4s infinite; margin:0 1px; vertical-align:middle; }
    .dot:nth-child(2){animation-delay:0.2s}
    .dot:nth-child(3){animation-delay:0.4s}
  </style>
</head>
<body>

<!-- LOGIN GATE -->
<div id="login-gate">
  <h1>Mobius Factory</h1>
  <p>Research knowledge base — admin access only</p>
  <a href="/auth/google" class="btn-google">
    <svg width="16" height="16" viewBox="0 0 24 24">
      <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
      <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
      <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
      <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
    </svg>
    Sign in with Google
  </a>
</div>

<!-- MAIN APP -->
<div id="app">

  <!-- TOPBAR -->
  <div id="topbar">
    <div id="topbar-row1">
      <span class="logo">MOBIUS FACTORY</span>
      <div class="spacer"></div>
      <div id="stats">
        <span>Briefs: <b id="stat-objectives">—</b></span>
        <span>Pending: <b id="stat-pending">—</b></span>
        <span>Knowledge: <b id="stat-knowledge">—</b></span>
      </div>
      <input id="crawl-count" type="number" min="1" max="100" value="1" style="display:none;width:46px;padding:3px 5px;font-family:var(--font);font-size:11px;background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:var(--radius);text-align:center;" title="Number of sources to crawl" />
      <button class="btn-xs outline" id="crawl-btn-top" style="display:none" title="Run crawl">↺ Crawl</button>
      <div id="user-info">
        <img id="user-avatar" src="" alt="" style="display:none" />
        <span id="user-name"></span>
        <button id="signout-btn">sign out</button>
      </div>
    </div>
    <div id="module-bar">
      <span id="module-status">No module</span>
      <span id="mode-status">—</span>
      <div id="module-chips"></div>
      <div class="spacer"></div>
      <input id="module-new-input" type="text" placeholder="new module…" autocomplete="off" />
      <button class="btn-xs" id="btn-add-module">+ Add</button>
    </div>
  </div>

  <!-- MAIN LAYOUT -->
  <div id="main-layout">

    <!-- LEFT: Input + Brief list -->
    <div id="left-panel">
      <div id="left-panel-header">
        <h3 id="left-panel-title">Briefs</h3>
        <div style="display:flex;gap:5px">
          <button class="btn-xs outline" id="btn-mode-brief" title="Brief session">Brief</button>
          <button class="btn-xs outline" id="btn-mode-query" title="Query session">Query</button>
          <button class="btn-xs outline" id="btn-new-brief">+ New</button>
        </div>
      </div>
      <div id="brief-list">
        <div class="empty-state">
          <div class="empty-icon">○</div>
          <p>Select or create a module,<br>then start a brief</p>
        </div>
      </div>
      <div id="input-area">
        <textarea id="main-input" placeholder="Talk to Gemini freely… describe your research interest, ask questions, or say 'go ahead' to start the crawl."></textarea>
        <div id="input-actions">
          <button class="btn-send" id="btn-send">Send</button>
          <button class="btn-xs outline" id="crawl-btn" disabled title="Run one crawl cycle — processes one source">↺ Run Crawl</button>
          <span id="hint-text" id="hint"></span>
        </div>
      </div>
    </div>

    <!-- RIGHT: Gemini responses / findings -->
    <div id="right-panel">
      <div id="right-panel-header">
        <h3 id="right-panel-title">Conversation</h3>
        <div id="right-panel-actions">
          <button class="btn-xs outline" id="btn-save-brief" style="display:none">Save Brief</button>
          <button class="btn-xs outline" id="btn-propose-query" style="display:none">Propose Query</button>
          <button class="btn-xs outline" id="btn-approve-query" style="display:none">Approve &amp; Run</button>
          <button class="btn-xs outline" id="btn-show-findings" style="display:none">Show Findings</button>
          <button class="btn-xs outline" id="btn-show-chat" style="display:none">Show Chat</button>
        </div>
      </div>

      <!-- Chat messages -->
      <div id="messages-panel">
        <div id="messages">
          <div class="empty-state">
            <div class="empty-icon">○</div>
            <p>Select a module and start talking to Gemini</p>
          </div>
        </div>
      </div>

      <!-- Findings (review mode) -->
      <div id="findings-panel">
        <div id="findings-scroll">
          <div class="empty-state">
            <div class="empty-icon">○</div>
            <p>No pending findings</p>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<div id="toast"></div>

<script>
  // ── STATE ──
  const state = {
    user: null,
    activeModule: '',
    mode: 'brief',           // 'brief' | 'query' | 'review'
    activeBriefId: null,
    briefs: [],
    messages: [],            // full conversation history sent to Gemini
    queryMessages: [],       // query session conversation
    queries: [],
    activeQueryId: null,
    findings: [],
    knowledge: [],
    crawlRunning: false
  };

  const $ = id => document.getElementById(id);

  // ── TOAST ──
  function toast(msg, type = '') {
    const t = $('toast');
    t.textContent = msg;
    t.className = 'show ' + type;
    clearTimeout(t._timer);
    t._timer = setTimeout(() => t.className = '', 2800);
  }

  // ── AUTH ──
  async function checkAuth() {
    try {
      const r = await fetch('/auth/google/status');
      const d = await r.json();
      if (d.authenticated) { state.user = d; showApp(d); }
    } catch {}
  }

  function showApp(user) {
    $('login-gate').style.display = 'none';
    $('app').style.display = 'flex';
    if (user.name) $('user-name').textContent = user.name;
    if (user.picture) { const img = $('user-avatar'); img.src = user.picture; img.style.display = ''; }
    loadModules();
  }

  $('signout-btn').addEventListener('click', () => { window.location.href = '/auth/google?action=signout'; });

  // ── MODULE ──
  async function loadModules() {
    try {
      const r = await fetch('/api/admin/modules');
      if (!r.ok) return;
      const modules = await r.json();
      renderModuleChips(modules);
      // Restore last active module
      const saved = localStorage.getItem('fh_module');
      if (saved && modules.includes(saved)) selectModule(saved, false);
    } catch {}
  }

  function renderModuleChips(modules) {
    const chips = $('module-chips');
    chips.innerHTML = modules.map(m =>
      `<button class="module-chip ${state.activeModule === m ? 'active' : ''}" data-mod="${esc(m)}">${esc(m)}</button>`
    ).join('');
    chips.querySelectorAll('.module-chip').forEach(btn =>
      btn.addEventListener('click', () => selectModule(btn.dataset.mod))
    );
  }

  function selectModule(mod, reload = true) {
    state.activeModule = mod;
    localStorage.setItem('fh_module', mod);
    $('module-status').textContent = mod.toUpperCase();
    $('crawl-btn-top').style.display = '';
    $('crawl-count').style.display = '';
    document.querySelectorAll('.module-chip').forEach(c =>
      c.classList.toggle('active', c.dataset.mod === mod)
    );
    setMode('brief');
    if (reload) {
      loadBriefs();
      loadStats();
    } else {
      loadBriefs();
      loadStats();
    }
  }

  $('btn-add-module').addEventListener('click', async () => {
    const name = $('module-new-input').value.trim().toLowerCase().replace(/[^a-z0-9_-]/g, '');
    if (!name) return;
    $('module-new-input').value = '';
    try {
      await fetch('/api/admin/modules', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name })
      });
      await loadModules();
      selectModule(name);
      toast('Module \'' + name + '\' created', 'success');
    } catch { toast('Failed to create module', 'error'); }
  });
  $('module-new-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') $('btn-add-module').click();
  });

  // ── MODE ──
  function setMode(mode) {
    state.mode = mode;
    $('mode-status').textContent = mode.toUpperCase();
    if (mode === 'brief') {
      $('left-panel-title').textContent = 'Briefs';
      $('right-panel-title').textContent = 'Conversation';
      $('btn-new-brief').style.display = '';
      $('crawl-btn').style.display = 'none';
      $('messages-panel').classList.remove('hidden');
      $('findings-panel').classList.remove('active');
      $('btn-show-findings').style.display = 'none';
      $('btn-show-chat').style.display = 'none';
      $('btn-save-brief').style.display = state.messages.length ? '' : 'none';
      $('main-input').placeholder = 'Talk to Gemini freely… describe your research interest, ask questions, or say \'go ahead\' when you\'re happy with the brief.';
    } else {
      $('left-panel-title').textContent = 'Briefs';
      $('right-panel-title').textContent = 'Findings';
      $('btn-new-brief').style.display = 'none';
      $('crawl-btn').style.display = '';
      $('crawl-btn').disabled = !state.activeModule;
      $('btn-save-brief').style.display = 'none';
      $('btn-show-findings').style.display = 'none';
      $('btn-show-chat').style.display = '';
      $('main-input').placeholder = 'Ask Gemini about findings, or click ↺ Run Crawl to gather more sources.';
      loadFindings();
    }
  }

  // ── STATS ──
  async function loadStats() {
    if (!state.activeModule) return;
    try {
      const r = await fetch('/api/admin/stats?module=' + enc(state.activeModule));
      if (!r.ok) return;
      const d = await r.json();
      $('stat-objectives').textContent = d.objectives ?? '—';
      $('stat-pending').textContent    = d.pending    ?? '—';
      $('stat-knowledge').textContent  = d.knowledge  ?? '—';
    } catch {}
  }

  // ── BRIEFS ──
  async function loadBriefs() {
    if (!state.activeModule) return;
    try {
      const r = await fetch('/api/admin/objectives?module=' + enc(state.activeModule));
      if (!r.ok) return;
      state.briefs = await r.json();
      renderBriefs();
    } catch {}
  }

  function renderBriefs() {
    const list = $('brief-list');
    if (!state.briefs.length) {
      list.innerHTML = '<div class="empty-state"><div class="empty-icon">○</div><p>No briefs yet — start talking to Gemini</p></div>';
      return;
    }
    list.innerHTML = state.briefs.map(b => `
      <div class="brief-item ${state.activeBriefId === b.id ? 'active' : ''}" data-id="${b.id}">
        <div class="brief-item-text">${esc(b.brief)}</div>
        <div class="brief-item-meta">
          <span class="status-dot ${b.active ? 'active' : 'closed'}"></span>
          ${fmtDate(b.created_at)}
        </div>
      </div>
    `).join('');
    list.querySelectorAll('.brief-item').forEach(el =>
      el.addEventListener('click', () => selectBrief(el.dataset.id))
    );
  }

  function selectBrief(id) {
    state.activeBriefId = id;
    const brief = state.briefs.find(b => b.id === id);
    renderBriefs();
    state.messages = [];
    state.briefSummaryShown = false;
    clearMessages();
    if (brief?.session_notes) {
      appendMsg('assistant', 'Session notes from last time:\n\n' + brief.session_notes + '\n\nWhat would you like to explore further?');
    } else {
      appendMsg('assistant', 'Brief: ' + brief.brief + '\n\nReady to continue. What would you like to explore?');
    }
    $('btn-save-brief').style.display = '';
  }

  $('btn-new-brief').addEventListener('click', () => {
    if (!state.activeModule) { toast('Select a module first', 'error'); return; }
    state.activeBriefId = null;
    state.messages = [];
    state.briefSummaryShown = false;
    clearMessages();
    renderBriefs();
    appendMsg('assistant', 'Starting a new brief for the ' + state.activeModule.toUpperCase() + ' module.\n\nWhat is your research interest? Describe it freely — I\'ll help shape it into a focused brief.');
    $('main-input').focus();
  });

  // ── MAIN SEND ──
  $('btn-send').addEventListener('click', sendMessage);
  $('main-input').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  async function createBriefFromConversation(text) {
    try {
      const r = await fetch('/api/admin/objectives', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ module: state.activeModule, brief: text.slice(0, 200) })
      });
      const obj = await r.json();
      state.activeBriefId = obj.id;
      state.briefs.unshift(obj);
      renderBriefs();
    } catch {}
  }

  // ── SAVE BRIEF — two-state ──
  // State 0: conversation ongoing  → button reads 'Save Brief'
  //          click triggers Gemini summary (Mission + Research Objectives)
  // State 1: summary shown, iterating → button reads 'Looks good — Commit'
  //          click commits to DB and ends session
  state.briefSummaryShown = false;

  function updateSaveBriefBtn() {
    const btn = $('btn-save-brief');
    btn.style.display = '';
    btn.textContent = state.briefSummaryShown ? 'Looks good — Commit' : 'Save Brief';
  }

  $('btn-save-brief').addEventListener('click', async () => {
    if (!state.activeBriefId || !state.messages.length) return;

    if (!state.briefSummaryShown) {
      // First click — ask Gemini for structured summary
      const thinking = appendThinking();
      $('btn-save-brief').disabled = true;
      try {
        const r = await fetch('/api/admin/brief-chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            objectiveId: state.activeBriefId,
            module: state.activeModule,
            messages: state.messages,
            summaryRequest: true
          })
        });
        const d = await r.json();
        thinking.remove();
        const reply = d.reply || 'No response';
        state.messages.push({ role: 'assistant', content: reply });
        appendMsg('assistant', reply, d.proposedSources);
        state.briefSummaryShown = true;
        updateSaveBriefBtn();
      } catch (e) {
        thinking.remove();
        appendMsg('assistant', 'Error: ' + e.message);
      }
      $('btn-save-brief').disabled = false;

    } else {
      // Second click — commit to DB
      $('btn-save-brief').disabled = true;
      try {
        const r = await fetch('/api/admin/brief-end', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ objectiveId: state.activeBriefId, messages: state.messages })
        });
        await r.json();
        await loadBriefs();
        await loadStats();
        state.briefSummaryShown = false;
        $('btn-save-brief').style.display = 'none';
        appendMsg('assistant', 'Brief committed. You can now run the crawl to start building the Knowledge Layer.');
        toast('Brief saved', 'success');
        setMode('review');
      } catch { toast('Failed to save brief', 'error'); }
      $('btn-save-brief').disabled = false;
    }
  });

  // ── CRAWL ──
  $('crawl-btn').addEventListener('click', runCrawl);
  $('crawl-btn-top').addEventListener('click', runCrawl);

  async function runCrawl() {
    if (!state.activeModule || state.crawlRunning) return;
    const n = Math.max(1, Math.min(100, parseInt($('crawl-count').value) || 1));
    state.crawlRunning = true;
    $('crawl-btn-top').disabled = true;
    $('crawl-btn').disabled = true;
    let completed = 0;
    for (let i = 0; i < n; i++) {
      const label = n === 1 ? '↺ Crawling…' : '↺ ' + (i + 1) + '/' + n;
      $('crawl-btn-top').textContent = label;
      $('crawl-btn').textContent = label;
      try {
        const r = await fetch('/api/crawl', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ module: state.activeModule })
        });
        const d = await r.json();
        await loadStats();
        if (!d.processed) break;
        completed++;
      } catch (e) { toast('Crawl error: ' + e.message, 'error'); break; }
    }
    state.crawlRunning = false;
    $('crawl-btn-top').disabled = false;
    $('crawl-btn-top').textContent = '↺ Crawl';
    $('crawl-btn').disabled = false;
    $('crawl-btn').textContent = '↺ Run Crawl';
    toast(completed + ' source' + (completed !== 1 ? 's' : '') + ' crawled', completed ? 'success' : '');
    await loadFindings();
  }

  // ── FINDINGS ──
  async function loadFindings() {
    if (!state.activeModule) return;
    try {
      const [fr, kr] = await Promise.all([
        fetch('/api/admin/findings?module=' + enc(state.activeModule)),
        fetch('/api/admin/knowledge?module=' + enc(state.activeModule))
      ]);
      if (fr.ok) state.findings = await fr.json();
      if (kr.ok) state.knowledge = await kr.json();
      renderFindings();
    } catch {}
  }

  function renderFindings() {
    const scroll = $('findings-scroll');
    if (!state.findings.length) {
      scroll.innerHTML = '<div class="empty-state"><div class="empty-icon">○</div><p>No pending findings.<br>Run a crawl to gather sources.</p></div>';
      return;
    }
    scroll.innerHTML = state.findings.map(f => {
      const conf = f.confidence >= 0.7 ? 'high' : f.confidence >= 0.4 ? 'mid' : 'low';
      const topic = (f.topic_tags || []).join(' · ') || 'Untagged';
      const tags = (f.topic_tags || []).map(t => `<span class="tag">${esc(t)}</span>`).join('');
      return `
        <div class="finding-card ${f._redundant ? 'redundant' : ''}" data-id="${f.id}">
          <div class="fc-header">
            <span class="fc-topic">${esc(topic)}</span>
            <span class="fc-meta">
              <span class="conf-badge conf-${conf}">${Math.round((f.confidence||0)*100)}%</span>
              ${f._redundant ? '<span class="redundant-flag">possibly redundant</span>' : ''}
            </span>
          </div>
          <div class="fc-plain">${esc(f.plain || '—')}</div>
          ${f.url ? `<a href="${esc(f.url)}" target="_blank" class="fc-url">${esc(f.url)}</a>` : ''}
          <div class="tag-list">${tags}</div>
          <div class="fc-actions">
            <button class="btn-approve" data-id="${f.id}">✓ Approve</button>
            <button class="btn-discard" data-id="${f.id}">✕ Discard</button>
          </div>
        </div>`;
    }).join('');

    scroll.querySelectorAll('.btn-approve').forEach(btn =>
      btn.addEventListener('click', e => { e.stopPropagation(); reviewAction(btn.dataset.id, 'approved'); })
    );
    scroll.querySelectorAll('.btn-discard').forEach(btn =>
      btn.addEventListener('click', e => { e.stopPropagation(); reviewAction(btn.dataset.id, 'discarded'); })
    );
  }

  async function reviewAction(id, status) {
    try {
      await fetch('/api/admin/findings', {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id, status, module: state.activeModule })
      });
      state.findings = state.findings.filter(f => f.id !== id);
      renderFindings();
      loadStats();
      toast(status === 'approved' ? '✓ Added to knowledge base' : 'Discarded', status === 'approved' ? 'success' : '');
    } catch { toast('Action failed', 'error'); }
  }

  // Toggle findings/chat in review mode
  $('btn-show-findings').addEventListener('click', () => {
    $('messages-panel').classList.add('hidden');
    $('findings-panel').classList.add('active');
    $('btn-show-findings').style.display = 'none';
    $('btn-show-chat').style.display = '';
    $('right-panel-title').textContent = 'Findings';
  });
  $('btn-show-chat').addEventListener('click', () => {
    $('messages-panel').classList.remove('hidden');
    $('findings-panel').classList.remove('active');
    $('btn-show-chat').style.display = 'none';
    $('btn-show-findings').style.display = '';
    $('right-panel-title').textContent = 'Conversation';
  });

  // ── RENDER HELPERS ──
  function clearMessages() {
    $('messages').innerHTML = '';
  }

  function appendMsg(role, content, proposedSources) {
    const container = $('messages');
    const es = container.querySelector('.empty-state');
    if (es) es.remove();

    const el = document.createElement('div');
    el.className = 'msg ' + role;
    const avatar = role === 'assistant' ? 'G' : 'B';

    let sourcesHtml = '';
    if (proposedSources?.length) {
      sourcesHtml = `<div class="sources-section">
        <h4>Proposed Sources</h4>
        ${proposedSources.map((s, i) => `
          <span class="source-chip" data-idx="${i}">
            ${esc(s.source_name || s.url)}
            <button class="approve-src" title="Approve">✓</button>
            <button class="reject-src" title="Reject">✕</button>
          </span>`).join('')}
      </div>`;
    }

    el.innerHTML = `<div class="msg-avatar">${avatar}</div><div class="msg-bubble">${esc(content)}${sourcesHtml}</div>`;

    if (proposedSources?.length) {
      el.querySelectorAll('.source-chip').forEach((chip, i) => {
        chip.querySelector('.approve-src').addEventListener('click', () => {
          chip.classList.add('approved'); chip.classList.remove('rejected');
          approveSource(proposedSources[i]);
        });
        chip.querySelector('.reject-src').addEventListener('click', () => {
          chip.classList.add('rejected'); chip.classList.remove('approved');
        });
      });
    }

    container.appendChild(el);
    container.scrollTop = container.scrollHeight;
    return el;
  }

  function appendThinking() {
    const container = $('messages');
    const es = container.querySelector('.empty-state');
    if (es) es.remove();
    const el = document.createElement('div');
    el.className = 'msg assistant';
    el.innerHTML = `<div class="msg-avatar">G</div><div class="msg-bubble thinking"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>`;
    container.appendChild(el);
    container.scrollTop = container.scrollHeight;
    return el;
  }

  async function approveSource(source) {
    if (!state.activeBriefId) return;
    try {
      await fetch('/api/admin/sources', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ ...source, module: state.activeModule, objective_id: state.activeBriefId, approved: true })
      });
      toast('Source approved', 'success');
    } catch { toast('Failed to save source', 'error'); }
  }

  function esc(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function enc(s) { return encodeURIComponent(s); }
  function fmtDate(iso) {
    if (!iso) return '';
    return new Date(iso).toLocaleDateString('en-AU', { day:'numeric', month:'short', year:'numeric' });
  }

  // ── MODE BUTTONS ──
  $('btn-mode-brief').addEventListener('click', () => {
    setMode('brief');
    loadBriefs();
  });
  $('btn-mode-query').addEventListener('click', () => {
    setMode('query');
    loadQueries();
  });

  // ── EXTENDED setMode for query ──
  const _setMode = setMode;
  // Override to handle query mode
  window.setMode = setMode;
  function setMode(mode) {
    state.mode = mode;
    $('mode-status').textContent = mode.toUpperCase();
    // Hide all action buttons first
    ['btn-save-brief','btn-propose-query','btn-approve-query',
     'btn-show-findings','btn-show-chat','crawl-btn'].forEach(id => {
      const el = $(id); if (el) el.style.display = 'none';
    });
    $('messages-panel').classList.remove('hidden');
    $('findings-panel').classList.remove('active');

    if (mode === 'brief') {
      $('left-panel-title').textContent = 'Briefs';
      $('right-panel-title').textContent = 'Conversation';
      $('btn-new-brief').style.display = '';
      $('btn-mode-brief').style.fontWeight = 'bold';
      $('btn-mode-query').style.fontWeight = 'normal';
      if (state.messages.length) $('btn-save-brief').style.display = '';
      $('main-input').placeholder = 'Talk to Gemini freely about your research interest…';
      renderBriefs();
    } else if (mode === 'query') {
      $('left-panel-title').textContent = 'Queries';
      $('right-panel-title').textContent = 'Query Session';
      $('btn-new-brief').style.display = '';
      $('btn-new-brief').textContent = '+ New Query';
      $('btn-mode-brief').style.fontWeight = 'normal';
      $('btn-mode-query').style.fontWeight = 'bold';
      $('btn-propose-query').style.display = '';
      $('main-input').placeholder = 'Discuss with Gemini what to research next. When ready, click Propose Query.';
      renderQueryList();
    } else {
      // review
      $('left-panel-title').textContent = 'Queries';
      $('right-panel-title').textContent = 'Findings';
      $('btn-new-brief').style.display = 'none';
      $('btn-mode-brief').style.fontWeight = 'normal';
      $('btn-mode-query').style.fontWeight = 'normal';
      $('crawl-btn').style.display = '';
      $('crawl-btn').disabled = !state.activeModule;
      $('btn-show-findings').style.display = 'none';
      $('btn-show-chat').style.display = '';
      loadFindings();
    }
  }

  // Patch btn-new-brief to handle both modes
  $('btn-new-brief').addEventListener('click', () => {
    if (!state.activeModule) { toast('Select a module first', 'error'); return; }
    if (state.mode === 'query') {
      startNewQuerySession();
    } else {
      state.activeBriefId = null;
      state.messages = [];
      state.briefSummaryShown = false;
      clearMessages();
      renderBriefs();
      appendMsg('assistant', 'Starting a new brief for the ' + state.activeModule.toUpperCase() + ' module.\n\nWhat is your research interest? Describe it freely.');
      $('main-input').focus();
    }
  });

  // ── QUERY SESSION ──
  async function loadQueries() {
    if (!state.activeModule) return;
    try {
      const r = await fetch('/api/admin/queries?module=' + enc(state.activeModule));
      if (!r.ok) return;
      state.queries = await r.json();
      renderQueryList();
    } catch {}
  }

  function renderQueryList() {
    const list = $('brief-list');
    if (!state.queries.length) {
      list.innerHTML = '<div class="empty-state"><div class="empty-icon">○</div><p>No queries yet<br>Click + New Query to start</p></div>';
      return;
    }
    list.innerHTML = state.queries.map(q => {
      const statusColour = q.status === 'complete' ? 'active' : q.status === 'running' ? 'active' : 'closed';
      const progress = q.findings_count + '/' + q.target_sources;
      return `
        <div class="brief-item ${state.activeQueryId === q.id ? 'active' : ''}" data-id="${q.id}">
          <div class="brief-item-text">${esc(q.query)}</div>
          <div class="brief-item-meta">
            <span class="status-dot ${statusColour}"></span>
            ${esc(q.status)} &middot; ${progress} sources &middot; ${fmtDate(q.created_at)}
          </div>
        </div>`;
    }).join('');
    list.querySelectorAll('.brief-item').forEach(el =>
      el.addEventListener('click', () => selectQuery(el.dataset.id))
    );
  }

  function selectQuery(id) {
    state.activeQueryId = id;
    state.queryMessages = [];
    const q = state.queries.find(x => x.id === id);
    renderQueryList();
    clearMessages();
    if (q) {
      appendMsg('assistant', 'Query: "' + q.query + '"\n\nTarget: ' + q.target_sources + ' sources · Found: ' + q.findings_count + ' · Status: ' + q.status +
        '\n\nYou can discuss this query, refine it, or switch to Review to see its findings.');
    }
  }

  function startNewQuerySession() {
    state.activeQueryId = null;
    state.queryMessages = [];
    clearMessages();
    renderQueryList();
    appendMsg('assistant', 'Let\'s define the next research query for the ' + state.activeModule.toUpperCase() + ' module.\n\nWhat would you like to investigate? Talk freely — we\'ll shape it into a specific research question together.');
    $('btn-propose-query').style.display = '';
    $('btn-approve-query').style.display = 'none';
    $('main-input').focus();
  }

  // Propose Query button — ask Gemini for structured proposal
  $('btn-propose-query').addEventListener('click', async () => {
    if (!state.activeModule) return;
    const thinking = appendThinking();
    $('btn-propose-query').disabled = true;
    try {
      const r = await fetch('/api/admin/query-chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          module: state.activeModule,
          objectiveId: state.activeBriefId,
          messages: state.queryMessages,
          summaryRequest: true
        })
      });
      const d = await r.json();
      thinking.remove();
      const reply = d.reply || 'No response';
      state.queryMessages.push({ role: 'assistant', content: reply });
      appendMsg('assistant', reply);
      // Parse query + target from response
      state._pendingQueryProposal = reply;
      $('btn-approve-query').style.display = '';
      $('btn-propose-query').textContent = 'Re-propose';
    } catch (e) { thinking.remove(); toast('Error: ' + e.message, 'error'); }
    $('btn-propose-query').disabled = false;
  });

  // Approve & Run button — extract query, save, start crawl
  $('btn-approve-query').addEventListener('click', async () => {
    if (!state._pendingQueryProposal) return;
    const proposal = state._pendingQueryProposal;

    // Extract query text and target from Gemini's structured response
    const queryMatch  = proposal.match(/RESEARCH QUERY\s*\n([\s\S]*?)(?=\n\nTARGET|$)/i);
    const targetMatch = proposal.match(/TARGET SOURCES\s*\n.*?(\d+)/i);

    const queryText   = queryMatch  ? queryMatch[1].trim()  : proposal.slice(0, 200);
    const targetCount = targetMatch ? parseInt(targetMatch[1]) : 10;

    $('btn-approve-query').disabled = true;
    try {
      // Save query to DB
      const r = await fetch('/api/admin/queries', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          module:         state.activeModule,
          query:          queryText,
          target_sources: targetCount,
          objective_id:   state.activeBriefId || null
        })
      });
      const q = await r.json();
      state.activeQueryId = q.id;
      state.queries.unshift(q);
      renderQueryList();
      appendMsg('assistant', 'Query saved: "' + queryText + '"\nTarget: ' + targetCount + ' sources.\n\nGemini will now research this autonomously. Click ↺ Crawl to run a cycle now, or it will run automatically on schedule.');
      $('btn-approve-query').style.display = 'none';
      $('btn-propose-query').textContent = 'Propose Query';
      state._pendingQueryProposal = null;
      toast('Query approved', 'success');
      // Auto-trigger one crawl cycle
      runCrawlForQuery(q.id);
    } catch (e) { toast('Failed to save query: ' + e.message, 'error'); }
    $('btn-approve-query').disabled = false;
  });

  // Override sendMessage to route to query-chat when in query mode
  const _sendMessage = sendMessage;
  async function sendMessage() {
    const text = $('main-input').value.trim();
    if (!text || !state.activeModule) return;
    $('main-input').value = '';

    if (state.mode === 'query') {
      appendMsg('user', text);
      state.queryMessages.push({ role: 'user', content: text });
      const thinking = appendThinking();
      $('btn-send').disabled = true;
      try {
        const r = await fetch('/api/admin/query-chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            module:      state.activeModule,
            objectiveId: state.activeBriefId,
            messages:    state.queryMessages
          })
        });
        const d = await r.json();
        thinking.remove();
        const reply = d.reply || 'No response';
        state.queryMessages.push({ role: 'assistant', content: reply });
        appendMsg('assistant', reply);
      } catch (e) { thinking.remove(); appendMsg('assistant', 'Error: ' + e.message); }
      $('btn-send').disabled = false;
      return;
    }

    // Brief mode — original flow
    appendMsg('user', text);
    state.messages.push({ role: 'user', content: text });
    const thinking = appendThinking();
    $('btn-send').disabled = true;
    try {
      if (!state.activeBriefId && state.mode === 'brief') {
        await createBriefFromConversation(text);
      }
      const r = await fetch('/api/admin/brief-chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ objectiveId: state.activeBriefId, module: state.activeModule, messages: state.messages })
      });
      const d = await r.json();
      thinking.remove();
      const reply = d.reply || 'No response';
      state.messages.push({ role: 'assistant', content: reply });
      appendMsg('assistant', reply, d.proposedSources);
      if (state.mode === 'brief') updateSaveBriefBtn();
    } catch (e) { thinking.remove(); appendMsg('assistant', 'Error: ' + e.message); }
    $('btn-send').disabled = false;
  }

  async function runCrawlForQuery(queryId) {
    if (!state.activeModule || state.crawlRunning) return;
    state.crawlRunning = true;
    $('crawl-btn-top').disabled = true;
    $('crawl-btn-top').textContent = '↺ Researching…';
    try {
      const r = await fetch('/api/crawl', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ module: state.activeModule, queryId })
      });
      const d = await r.json();
      await loadStats();
      await loadQueries();
      if (d.message) toast(d.message, d.complete ? 'success' : '');
    } catch (e) { toast('Crawl error: ' + e.message, 'error'); }
    state.crawlRunning = false;
    $('crawl-btn-top').disabled = false;
    $('crawl-btn-top').textContent = '↺ Crawl';
  }

  // Update runCrawl to pass active queryId
  async function runCrawl() {
    if (!state.activeModule || state.crawlRunning) return;
    const n = Math.max(1, Math.min(100, parseInt($('crawl-count').value) || 1));
    state.crawlRunning = true;
    $('crawl-btn-top').disabled = true;
    $('crawl-btn').disabled = true;
    let completed = 0;
    for (let i = 0; i < n; i++) {
      const label = n === 1 ? '↺ Crawling…' : '↺ ' + (i + 1) + '/' + n;
      $('crawl-btn-top').textContent = label;
      $('crawl-btn').textContent = label;
      try {
        const r = await fetch('/api/crawl', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ module: state.activeModule, queryId: state.activeQueryId || undefined })
        });
        const d = await r.json();
        await loadStats();
        if (!d.processed) { toast(d.message || 'Done', ''); break; }
        completed++;
        if (d.complete) { toast(d.message, 'success'); break; }
      } catch (e) { toast('Crawl error: ' + e.message, 'error'); break; }
    }
    state.crawlRunning = false;
    $('crawl-btn-top').disabled = false;
    $('crawl-btn-top').textContent = '↺ Crawl';
    $('crawl-btn').disabled = false;
    $('crawl-btn').textContent = '↺ Run Crawl';
    if (completed > 0) toast(completed + ' cycle' + (completed !== 1 ? 's' : '') + ' completed', 'success');
    await loadFindings();
    await loadQueries();
  }

  // ── INIT ──
  checkAuth();
</script>
</body>
</html>
